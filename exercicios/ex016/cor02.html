<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /* Configurações globais das CSS */
            height:  100%;
        }
        body {
            background-image: linear-gradient(to bottom, #880CDC, #BB00C5, #D30294, #EC064F, #F25A17, #F29208, #F29208, #F7B20C, #F4A606);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando Gradiente</h1>
</body>
</html>
