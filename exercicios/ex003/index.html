<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com Imagens</title>
</head>
<body>
    <h1>Testando carga e Imagens</h1>
    <p>Abaixo você vai ver uma imagem que está na mesma pasta.</p>
    <img src="logo-html5.png" alt="logo HTML5">
    <p>Podemos também carregar imagens que estão em sub-pastas.</p>
    <img src="imagens/logo-css3.png" alt=""> <!--Imagens é colocada com esse codigo--><!--Alt Significa o nome que você quer dar para a imagem-->
    <p>Também podemos carregar imagens externas</p>
    <img src="https://storage.googleapis.com/eti-academy/courses/javascript-basico.jpg" alt="Logo JavaScript">
</body>
</html>
