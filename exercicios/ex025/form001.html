<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0px;
            padding: 0px;
            font-weight: bolder;
        }

        body {
            background-color: darkslategrey
        }

        main {
            background-color: darkcyan ;  
            border-radius: 20px;
            width: 700px;
            margin: 30px;
            padding: 30px;
            position: absolute;
            
            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);
        }

        main > h1 {
            text-align: center;
            padding: 10px;
        }

        form {
            text-align: center;
        }
     
    </style>
</head>
<body>
    <main>
        <h1>Meu primeiro formulário</h1>
        <form action="cadastro.php" autocomplete="off">
            <p><label for="inome">Nome:</label>
                <input type="text" name="nome" id="inome"></p>
            <p><label for="isobrenome">Sobrenome:</label>
                <input type="text" name="sobrenome" id="isobrenome"></p>
                <br>
            <p><input type="submit" value="Enviar" style="width: 200px; height: 50px;"></p>
            <br>
        </form>
    </main>
</body>
</html>
